<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">QQK X Web Send DM Outreach workflow</title>
  <desc id="desc">A five-step flow from prompt and approval through Local Admin, BitBrowser, visible X Chat controls, and a verified task report.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071925"/>
      <stop offset="1" stop-color="#102b3b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity=".25"/>
    </filter>
  </defs>
  <rect width="1200" height="360" rx="24" fill="url(#bg)"/>
  <text x="60" y="62" fill="#fff" font-family="Arial, sans-serif" font-size="30" font-weight="700">One approved DM through the visible X Chat UI</text>
  <text x="60" y="94" fill="#91b9ca" font-family="Arial, sans-serif" font-size="17">No X API · No X Pro · No constructed conversation URL</text>
  <g filter="url(#shadow)" font-family="Arial, sans-serif">
    <g transform="translate(58 132)">
      <rect width="180" height="136" rx="16" fill="#fff"/>
      <circle cx="32" cy="32" r="17" fill="#12b8d4"/>
      <text x="32" y="38" text-anchor="middle" fill="#071925" font-size="16" font-weight="700">1</text>
      <text x="24" y="76" fill="#071925" font-size="18" font-weight="700">Prompt</text>
      <text x="24" y="103" fill="#46606e" font-size="14">Recipient + message</text>
      <text x="24" y="124" fill="#46606e" font-size="14">Safety approval</text>
    </g>
    <g transform="translate(282 132)">
      <rect width="180" height="136" rx="16" fill="#fff"/>
      <circle cx="32" cy="32" r="17" fill="#12b8d4"/>
      <text x="32" y="38" text-anchor="middle" fill="#071925" font-size="16" font-weight="700">2</text>
      <text x="24" y="76" fill="#071925" font-size="18" font-weight="700">QQK Local Admin</text>
      <text x="24" y="103" fill="#46606e" font-size="14">Validate skill input</text>
      <text x="24" y="124" fill="#46606e" font-size="14">Start task report</text>
    </g>
    <g transform="translate(506 132)">
      <rect width="180" height="136" rx="16" fill="#fff"/>
      <circle cx="32" cy="32" r="17" fill="#12b8d4"/>
      <text x="32" y="38" text-anchor="middle" fill="#071925" font-size="16" font-weight="700">3</text>
      <text x="24" y="76" fill="#071925" font-size="18" font-weight="700">BitBrowser</text>
      <text x="24" y="103" fill="#46606e" font-size="14">Reuse signed-in profile</text>
      <text x="24" y="124" fill="#46606e" font-size="14">Keep it open</text>
    </g>
    <g transform="translate(730 132)">
      <rect width="180" height="136" rx="16" fill="#fff"/>
      <circle cx="32" cy="32" r="17" fill="#12b8d4"/>
      <text x="32" y="38" text-anchor="middle" fill="#071925" font-size="16" font-weight="700">4</text>
      <text x="24" y="76" fill="#071925" font-size="18" font-weight="700">Visible X Chat</text>
      <text x="24" y="103" fill="#46606e" font-size="14">Search exact handle</text>
      <text x="24" y="124" fill="#46606e" font-size="14">Type and send</text>
    </g>
    <g transform="translate(954 132)">
      <rect width="188" height="136" rx="16" fill="#d6f8eb"/>
      <circle cx="32" cy="32" r="17" fill="#1cb47d"/>
      <text x="32" y="38" text-anchor="middle" fill="#071925" font-size="16" font-weight="700">5</text>
      <text x="24" y="76" fill="#071925" font-size="18" font-weight="700">Verified Result</text>
      <text x="24" y="103" fill="#46606e" font-size="14">Visible outgoing DM</text>
      <text x="24" y="124" fill="#46606e" font-size="14">Evidence + counters</text>
    </g>
  </g>
  <g fill="#55d4e8">
    <path d="M246 194h26v-8l12 14-12 14v-8h-26z"/>
    <path d="M470 194h26v-8l12 14-12 14v-8h-26z"/>
    <path d="M694 194h26v-8l12 14-12 14v-8h-26z"/>
    <path d="M918 194h26v-8l12 14-12 14v-8h-26z"/>
  </g>
  <text x="60" y="322" fill="#91b9ca" font-family="Arial, sans-serif" font-size="15">Open-source skill implementation · Runtime execution requires QQK Local Admin</text>
</svg>
